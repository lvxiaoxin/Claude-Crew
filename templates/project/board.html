<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .autonomy-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .autonomy-supervised { background: #1e40af; color: #93c5fd; }
  .autonomy-advisory { background: #854d0e; color: #fcd34d; }
  .autonomy-autonomous { background: #166534; color: #86efac; }
  .refresh-btn { background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: #475569; }
  .updated { font-size: 12px; color: #64748b; }

  .stages { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
  .stage { background: #1e293b; border-radius: 12px; padding: 20px; }
  .stage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .stage-name { font-size: 16px; font-weight: 600; }
  .stage-stats { font-size: 13px; color: #94a3b8; }
  .progress-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .progress-fill.pending { background: #475569; }
  .progress-fill.in_progress { background: #3b82f6; }
  .progress-fill.completed { background: #22c55e; }

  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
  .kanban-column { background: #1e293b; border-radius: 12px; padding: 16px; min-height: 200px; }
  .column-header { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid; }
  .column-header.pending { border-color: #475569; color: #94a3b8; }
  .column-header.in_progress { border-color: #3b82f6; color: #60a5fa; }
  .column-header.completed { border-color: #22c55e; color: #4ade80; }
  .column-header.blocked { border-color: #ef4444; color: #f87171; }
  .column-count { font-weight: 400; color: #64748b; }

  .task-card { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid; }
  .task-card.pending { border-left-color: #475569; }
  .task-card.in_progress { border-left-color: #3b82f6; }
  .task-card.completed { border-left-color: #22c55e; }
  .task-card.blocked { border-left-color: #ef4444; }
  .task-id { font-size: 11px; color: #64748b; font-family: monospace; }
  .task-title { font-size: 13px; margin: 4px 0; }
  .task-assignee { font-size: 11px; color: #94a3b8; }

  .workload { background: #1e293b; border-radius: 12px; padding: 20px; }
  .workload h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .workload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .role-card { background: #0f172a; border-radius: 8px; padding: 12px; text-align: center; }
  .role-name { font-size: 13px; font-weight: 600; text-transform: capitalize; margin-bottom: 4px; }
  .role-count { font-size: 24px; font-weight: 700; color: #3b82f6; }
  .role-label { font-size: 11px; color: #64748b; }

  .empty { color: #475569; font-size: 13px; padding: 20px; text-align: center; }

  @media (max-width: 768px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="projectName">Project Board</h1>
    <div class="updated" id="updatedAt"></div>
  </div>
  <div class="header-right">
    <span class="autonomy-badge" id="autonomyBadge"></span>
    <button class="refresh-btn" onclick="loadBoard()">Refresh</button>
  </div>
</div>

<div class="stages" id="stages"></div>

<h2 style="font-size: 18px; margin-bottom: 16px;">Tasks</h2>
<div class="kanban" id="kanban"></div>

<div class="workload" id="workload">
  <h2>Role Workload</h2>
  <div class="workload-grid" id="workloadGrid"></div>
</div>

<script>
async function loadBoard() {
  try {
    const resp = await fetch('board.json');
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('stages').innerHTML =
      '<div class="empty">Could not load board.json. Make sure it exists in the same directory.</div>';
  }
}

function render(data) {
  // Header
  document.getElementById('projectName').textContent = data.project || 'Project Board';
  document.getElementById('updatedAt').textContent = data.updated ? `Updated: ${data.updated}` : '';

  const badge = document.getElementById('autonomyBadge');
  badge.textContent = data.autonomy || 'supervised';
  badge.className = `autonomy-badge autonomy-${data.autonomy || 'supervised'}`;

  // Stages
  const stagesEl = document.getElementById('stages');
  stagesEl.innerHTML = data.stages.map(stage => {
    const total = stage.tasks.total || 0;
    const completed = stage.tasks.completed || 0;
    const progress = total > 0 ? Math.round((completed / total) * 100) : 0;
    const statusClass = stage.status === 'completed' ? 'completed' :
                        stage.status === 'in_progress' ? 'in_progress' : 'pending';
    return `
      <div class="stage">
        <div class="stage-header">
          <span class="stage-name">${stage.name}</span>
          <span class="stage-stats">${completed}/${total} tasks &middot; ${progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${statusClass}" style="width: ${progress}%"></div>
        </div>
      </div>`;
  }).join('');

  // Kanban
  const kanbanEl = document.getElementById('kanban');
  const statuses = ['pending', 'in_progress', 'completed', 'blocked'];
  const labels = { pending: 'Pending', in_progress: 'In Progress', completed: 'Completed', blocked: 'Blocked' };

  kanbanEl.innerHTML = statuses.map(status => {
    const tasks = (data.tasksByStatus[status] || []);
    const cards = tasks.length > 0
      ? tasks.map(t => `
          <div class="task-card ${status}">
            <div class="task-id">${t.id}</div>
            <div class="task-title">${t.title}</div>
            <div class="task-assignee">${t.assignee || ''}</div>
          </div>`).join('')
      : '<div class="empty">No tasks</div>';
    return `
      <div class="kanban-column">
        <div class="column-header ${status}">${labels[status]} <span class="column-count">(${tasks.length})</span></div>
        ${cards}
      </div>`;
  }).join('');

  // Workload
  const grid = document.getElementById('workloadGrid');
  const workload = data.roleWorkload || {};
  const roles = Object.keys(workload);
  if (roles.length > 0) {
    grid.innerHTML = roles.map(role => `
      <div class="role-card">
        <div class="role-name">${role}</div>
        <div class="role-count">${workload[role]}</div>
        <div class="role-label">active tasks</div>
      </div>`).join('');
  } else {
    grid.innerHTML = '<div class="empty">No tasks assigned yet</div>';
  }
}

loadBoard();
</script>
</body>
</html>
